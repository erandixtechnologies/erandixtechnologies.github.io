<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><script>localStorage.setItem("Env","Dev");localStorage.setItem("Config","Dev")</script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Erandix Technologies</title>
</head>
<style>
    body{
        font-family: Cambria;
        padding: 0;
        margin:0;
        position: fixed;
        width: 100%;
        height: 100%;
        text-align: center;
        display: block;
    }
    .OfflineTitle{
        padding: 5vh;
    }
    .OfflineHolder{
        width: 100%;
        height: 50px;
        display: inline-flex;
    }
    .OfflineButton{
        margin: auto;
        height: 40px;
        width:45%;
        border:none;
        color:white;
        border-radius: 10px;
    }
    .OfflineFooter{
        position: absolute;
        bottom:0;
        width:100%;
        height:100px;
        display:inline-flex;
        left: 0;
        font-style: bold;
    }
    p{
        margin: auto;
    }
    .ModeDiv{
        position: absolute;
        top:1vh;
        right: 3vh;
        height: 50px;
        width:50px;
        background: black;
        border-radius: 100%;
    }
</style>
<body></body>
<script>
    const ROUTEJS=(NAME)=>{
        const code = localStorage.getItem(NAME);
        if (!code) {
            console.warn("No code found in localStorage for key:",NAME);
            return;
        };
        const script = document.createElement("script");
        script.type = "text/javascript";
        script.textContent = code;
        document.body.appendChild(script);
    };
    const ROUTECSS=(NAME)=>{
        const css = localStorage.getItem(NAME);
        if (!css) {
            console.warn("No CSS found for key:", NAME);
            return;
        };
        const style = document.createElement("style");
        style.type = "text/css";
        style.textContent = css;
        document.head.appendChild(style);
    };
    const BODY=document.querySelector("body");
    const AUTOSTART=()=>{
        if (localStorage.getItem("Env") === "Dev" ) {
            const script = document.createElement("script");
            script.src = "./index.js";
            script.defer = true;
            document.head.appendChild(script);
        }else{
            if (navigator.onLine) {
                const script = document.createElement("script");
                script.src = "./index.js";
                script.defer = true;
                document.head.appendChild(script);
            }else{
                sessionStorage.setItem("OfflineMode","True")
            };
        };
    };
    if (localStorage.getItem("Updates")) {
       ROUTEJS("ERANDIXCONFIG");APPMODE();AUTOSTART();
    } else {
        if (navigator.onLine) {
            AUTOSTART();
        } else {
            BODY.innerHTML=`
                <div class="ModeDiv"></div>
                <h1 class="OfflineTitle">OFFLINE</h1>
                <p>Failed To Download New Assets.</p>
                <br><br>
                <p>Please Connect to the Internet and Try Again.</p>
                <br><br>
                <div class="OfflineHolder">
                    <button id="Reconnect" style="background: forestgreen;" class="OfflineButton">Retry</button>
                    <button id="ContactAdmin" style="background: teal;"  class="OfflineButton" >Contact Admin</button>
                </div>
                <footer class="OfflineFooter">
                    <p style="color: green;"> @ Erandix Technologies</p>
                </footer>
            `;
            const ModeDiv=document.querySelector(".ModeDiv");
            if (localStorage.getItem("AppMode")) {
                BODY.style.background="#000000";
                BODY.style.color="#FFFFFF";
                ModeDiv.style.background="#FFFFFF";
            } else {
                BODY.style.background="#FFFFFF";
                BODY.style.color="#000000";
                ModeDiv.style.background="#000000";
            }
            ModeDiv.addEventListener("click",()=>{
                if (localStorage.getItem("AppMode")) {
                    localStorage.removeItem("AppMode");
                    location.reload();
                }else{
                    localStorage.setItem("AppMode","True");
                    location.reload();
                };
            });
            const Reconnect=document.querySelector("#Reconnect");
            Reconnect.addEventListener("click",()=>{
                location.reload();
            });
            const ContactAdmin=document.querySelector("#ContactAdmin");
            ContactAdmin.addEventListener("click",()=>{
                location.href="https://erandixtechnologies.github.io/BrokenLinks.html"
            });  
        }; 
    };
</script>
</html>
